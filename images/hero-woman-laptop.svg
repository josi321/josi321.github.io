<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 520" aria-hidden="true">
  <defs>
    <radialGradient id="herobg" cx="40%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#c8d4ba" stop-opacity="1"/>
      <stop offset="55%" stop-color="#97b57b" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#51733f" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="grain4" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" seed="11"/>
      <feColorMatrix values="0 0 0 0 0.32  0 0 0 0 0.45  0 0 0 0 0.25  0 0 0 0.4 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- LARGE organic blob backdrop -->
  <path d="M 280 30
           C 410 30 510 110 530 250
           C 545 360 460 470 320 488
           C 180 506 56 430 38 290
           C 24 160 145 30 280 30 Z"
        fill="url(#herobg)"/>
  <path d="M 280 30
           C 410 30 510 110 530 250
           C 545 360 460 470 320 488
           C 180 506 56 430 38 290
           C 24 160 145 30 280 30 Z"
        fill="url(#herobg)"
        filter="url(#grain4)"
        opacity="0.5"/>

  <!-- Highlight crescent -->
  <path d="M 110 100
           C 180 60 260 50 340 70
           C 290 70 220 100 180 130
           C 150 160 130 195 120 220 Z"
        fill="#dfeacd"
        opacity="0.32"/>

  <!-- Subtle scattered doodle marks (very faded, decorative) -->
  <g stroke="#dfeacd" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4">
    <!-- Coffee cup doodle -->
    <path d="M 110 90 L 138 90 L 134 108 L 114 108 Z M 138 94 Q 146 96 144 102"/>
    <!-- Heart -->
    <path d="M 470 70 Q 462 62 470 56 Q 478 62 482 64 Q 488 60 494 64 Q 498 70 482 84 Q 470 76 470 70 Z" fill="#dfeacd" stroke="none" opacity="0.45"/>
    <!-- Lightbulb -->
    <circle cx="58" cy="180" r="10"/>
    <line x1="56" y1="190" x2="60" y2="194"/>
    <line x1="54" y1="172" x2="48" y2="166"/>
    <line x1="62" y1="172" x2="68" y2="166"/>
    <!-- Magnifier -->
    <circle cx="492" cy="210" r="9"/>
    <line x1="498" y1="216" x2="504" y2="222"/>
    <!-- Asterisk -->
    <line x1="490" y1="380" x2="498" y2="388"/>
    <line x1="498" y1="380" x2="490" y2="388"/>
    <line x1="494" y1="378" x2="494" y2="390"/>
    <!-- Dot pair -->
    <circle cx="80" cy="380" r="2.5" fill="#dfeacd" stroke="none"/>
    <circle cx="92" cy="372" r="1.8" fill="#dfeacd" stroke="none"/>
  </g>

  <!-- Desk surface -->
  <line x1="40" y1="480" x2="520" y2="480" stroke="#3d4034" stroke-width="3" stroke-linecap="round"/>

  <!-- Woman, 3/4 view facing laptop, kawaii style -->
  <g stroke="#3d4034" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Long ponytail flowing to right side, behind body -->
    <path d="M 360 200
             Q 412 218 432 268
             Q 446 320 432 376
             Q 422 412 400 432
             Q 384 444 364 444
             Q 360 432 372 412
             Q 396 380 412 332
             Q 422 286 408 252
             Q 388 222 358 220 Z"
          fill="#3d4034"/>
    <!-- Ponytail strands -->
    <path d="M 396 280 Q 408 320 396 360" stroke="#1b1c1e" stroke-width="1.5" opacity="0.7" fill="none"/>
    <path d="M 416 290 Q 422 326 408 366" stroke="#1b1c1e" stroke-width="1.5" opacity="0.6" fill="none"/>

    <!-- Hair tie -->
    <ellipse cx="360" cy="222" rx="14" ry="8" fill="#51733f"/>

    <!-- Hair (head top, swept with bangs) -->
    <path d="M 252 196
             Q 244 174 264 162
             Q 286 152 312 156
             Q 338 162 354 184
             Q 360 200 358 220
             L 354 226
             Q 352 200 340 188
             Q 318 178 296 188
             Q 282 200 276 218
             Q 268 230 256 222
             Q 248 210 252 196 Z"
          fill="#3d4034"/>

    <!-- Bangs swooping -->
    <path d="M 264 196
             Q 280 184 304 188
             Q 320 192 332 204
             Q 320 198 304 198
             Q 286 200 274 212 Z"
          fill="#1b1c1e" stroke="none"/>

    <!-- Face (3/4 view, light skin tone) -->
    <path d="M 268 218
             Q 264 198 286 196
             Q 312 196 332 208
             Q 348 222 348 246
             Q 348 274 332 290
             Q 310 304 290 300
             Q 270 292 264 270
             Q 262 244 268 218 Z"
          fill="#fbe8d6"/>

    <!-- Ear hint -->
    <path d="M 348 240 Q 354 244 354 252 Q 352 258 346 256" fill="#fbe8d6" stroke-width="2"/>

    <!-- Closed-eye lashes (kawaii style) -->
    <path d="M 290 246 Q 298 252 308 248" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M 322 244 Q 328 250 336 246" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Brow hint -->
    <path d="M 290 232 Q 298 228 306 232" stroke-width="2" opacity="0.85"/>

    <!-- Cheek blush -->
    <ellipse cx="288" cy="266" rx="10" ry="5" fill="#f4a890" stroke="none" opacity="0.7"/>
    <ellipse cx="332" cy="262" rx="9" ry="4.5" fill="#f4a890" stroke="none" opacity="0.7"/>

    <!-- Small smile (slight, content) -->
    <path d="M 304 280 Q 312 286 322 282" stroke-width="2.2"/>

    <!-- Neck -->
    <path d="M 296 304 L 296 332 L 326 332 L 326 304" fill="#fbe8d6"/>

    <!-- Shirt — sage striped t-shirt, 3/4 view tilted toward laptop -->
    <path d="M 248 348
             Q 240 360 234 384
             L 220 446
             L 232 472
             L 364 472
             L 388 432
             L 374 380
             Q 366 358 358 348
             Q 348 338 338 334
             L 326 332
             L 296 332
             L 280 336
             Q 264 340 248 348 Z"
          fill="#97b57b"/>
    <!-- Stripes on shirt -->
    <path d="M 240 376 Q 296 388 380 376" stroke="#dfeacd" stroke-width="2" fill="none"/>
    <path d="M 232 396 Q 296 410 386 394" stroke="#dfeacd" stroke-width="2" fill="none"/>
    <path d="M 226 418 Q 296 432 388 418" stroke="#dfeacd" stroke-width="2" fill="none"/>
    <path d="M 224 442 Q 296 456 388 442" stroke="#dfeacd" stroke-width="2" fill="none"/>
    <!-- Crew neck collar -->
    <path d="M 296 332 Q 312 340 326 332" stroke-width="2.4"/>

    <!-- Arms reaching to laptop (left arm visible coming out of sleeve) -->
    <path d="M 234 384 Q 218 410 222 446 L 232 446 Q 240 412 248 388 Z" fill="#97b57b"/>
    <!-- Right arm folded behind laptop hint -->
    <path d="M 374 380 Q 388 398 388 432 L 376 432 Q 372 400 366 384 Z" fill="#97b57b"/>

    <!-- Hands (light skin) emerging from sleeves -->
    <ellipse cx="226" cy="448" rx="14" ry="7" fill="#fbe8d6" stroke-width="2.4"/>
    <ellipse cx="380" cy="436" rx="14" ry="7" fill="#fbe8d6" stroke-width="2.4"/>
  </g>

  <!-- Laptop in front, gray, half-open -->
  <g stroke="#3d4034" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lid (back of screen visible from behind/3/4) -->
    <path d="M 130 420
             L 130 350
             Q 130 344 138 344
             L 290 344
             Q 298 344 298 350
             L 298 420 Z"
          fill="#a3a89a"/>
    <!-- Apple logo circle -->
    <circle cx="214" cy="386" r="11" fill="none" stroke-width="2.4"/>
    <circle cx="214" cy="386" r="3.5" fill="#3d4034" stroke="none"/>
    <!-- Base -->
    <path d="M 110 466 L 320 466 L 308 480 L 122 480 Z" fill="#c4c8b8"/>
    <!-- Hinge -->
    <line x1="130" y1="420" x2="298" y2="420" stroke-width="2.4"/>
    <line x1="120" y1="466" x2="312" y2="466" stroke-width="2.4"/>
  </g>
</svg>
