<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- Hand-drawn workspace illustration -->
  <!-- Desk surface line -->
  <path d="M 30 320 Q 240 318 450 322" stroke-width="1.8"/>

  <!-- Laptop body -->
  <g transform="translate(110 200)">
    <!-- Screen -->
    <path d="M 8 8 L 142 8 L 138 96 L 12 96 Z" />
    <!-- Screen content lines -->
    <line x1="22" y1="26" x2="124" y2="26" stroke-width="1.2" opacity="0.55"/>
    <line x1="22" y1="40" x2="100" y2="40" stroke-width="1.2" opacity="0.55"/>
    <line x1="22" y1="54" x2="118" y2="54" stroke-width="1.2" opacity="0.55"/>
    <line x1="22" y1="68" x2="80" y2="68" stroke-width="1.2" opacity="0.55"/>
    <!-- Cursor block accent -->
    <rect x="22" y="76" width="42" height="6" fill="var(--accent, #8585e0)" stroke="none" opacity="0.85"/>
    <!-- Keyboard base -->
    <path d="M 0 100 L 156 100 L 162 122 L -6 122 Z"/>
    <!-- Trackpad indicator -->
    <line x1="62" y1="112" x2="98" y2="112" stroke-width="1.2"/>
  </g>

  <!-- Notebook (open) -->
  <g transform="translate(290 230)">
    <!-- Spine and pages -->
    <path d="M 0 8 Q 50 -4 100 8 L 100 80 Q 50 70 0 80 Z"/>
    <line x1="50" y1="2" x2="50" y2="76" stroke-width="1" opacity="0.5"/>
    <!-- Lines on left page -->
    <line x1="10" y1="22" x2="44" y2="22" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="34" x2="44" y2="34" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="46" x2="40" y2="46" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="58" x2="44" y2="58" stroke-width="1" opacity="0.6"/>
    <!-- Sketch on right page (small flowchart) -->
    <circle cx="62" cy="26" r="3" fill="var(--accent, #8585e0)" stroke="none"/>
    <circle cx="78" cy="26" r="3" fill="var(--accent, #8585e0)" stroke="none"/>
    <circle cx="94" cy="26" r="3" fill="var(--accent, #8585e0)" stroke="none"/>
    <line x1="65" y1="26" x2="75" y2="26" stroke-width="1"/>
    <line x1="81" y1="26" x2="91" y2="26" stroke-width="1"/>
    <rect x="60" y="42" width="32" height="12" rx="2"/>
    <rect x="60" y="60" width="22" height="8" rx="2"/>
  </g>

  <!-- Pen -->
  <g transform="translate(232 308) rotate(-18)">
    <path d="M 0 0 L 60 0 L 64 4 L 60 8 L 0 8 Z"/>
    <path d="M 60 0 L 70 4 L 60 8" fill="var(--accent, #8585e0)" stroke="none"/>
    <line x1="14" y1="0" x2="14" y2="8" stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Coffee mug -->
  <g transform="translate(38 240)">
    <!-- Cup body -->
    <path d="M 6 12 L 60 12 L 56 76 Q 30 82 10 76 Z"/>
    <!-- Handle -->
    <path d="M 60 22 Q 78 28 76 48 Q 76 60 60 60"/>
    <!-- Steam wisps -->
    <path d="M 18 4 Q 22 -4 18 -10 Q 14 -16 18 -22" stroke-width="1.2" opacity="0.7"/>
    <path d="M 32 4 Q 36 -4 32 -10 Q 28 -16 32 -22" stroke-width="1.2" opacity="0.7"/>
    <path d="M 46 4 Q 50 -4 46 -10 Q 42 -16 46 -22" stroke-width="1.2" opacity="0.7"/>
    <!-- Coffee surface -->
    <ellipse cx="33" cy="14" rx="27" ry="3.5" fill="var(--accent, #8585e0)" stroke="none" opacity="0.55"/>
  </g>

  <!-- Plant in pot -->
  <g transform="translate(380 200)">
    <!-- Pot -->
    <path d="M 14 78 L 70 78 L 64 118 L 20 118 Z"/>
    <line x1="12" y1="76" x2="72" y2="76" stroke-width="1.6"/>
    <!-- Stems -->
    <path d="M 42 78 L 42 38" stroke-width="1.2"/>
    <path d="M 42 78 Q 28 60 14 36" stroke-width="1.2"/>
    <path d="M 42 78 Q 56 58 72 38" stroke-width="1.2"/>
    <!-- Leaves (organic blobs) -->
    <path d="M 36 32 Q 28 24 22 30 Q 26 42 38 42 Q 48 38 42 30 Z" fill="var(--accent, #8585e0)" fill-opacity="0.18"/>
    <path d="M 6 30 Q -4 22 -2 16 Q 8 14 16 22 Q 20 30 12 36 Z" fill="var(--accent, #8585e0)" fill-opacity="0.18"/>
    <path d="M 60 28 Q 70 18 80 22 Q 84 32 76 38 Q 64 38 56 32 Z" fill="var(--accent, #8585e0)" fill-opacity="0.18"/>
    <!-- Leaf vein -->
    <line x1="30" y1="32" x2="38" y2="38" stroke-width="0.8" opacity="0.7"/>
    <line x1="6" y1="22" x2="14" y2="32" stroke-width="0.8" opacity="0.7"/>
    <line x1="68" y1="22" x2="74" y2="32" stroke-width="0.8" opacity="0.7"/>
  </g>

  <!-- Stack of books (left side, behind mug) -->
  <g transform="translate(28 290)">
    <rect x="0" y="0" width="86" height="10" rx="1"/>
    <rect x="6" y="-12" width="80" height="10" rx="1"/>
    <rect x="2" y="-24" width="78" height="10" rx="1"/>
    <!-- Title slip on top book -->
    <line x1="14" y1="-19" x2="56" y2="-19" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Sticky note -->
  <g transform="translate(380 88) rotate(6)">
    <rect x="0" y="0" width="62" height="56" fill="var(--accent, #8585e0)" fill-opacity="0.14"/>
    <line x1="8" y1="14" x2="50" y2="14" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="26" x2="42" y2="26" stroke-width="1" opacity="0.6"/>
    <line x1="8" y1="38" x2="46" y2="38" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Small floating dots (the "thinking" feel) -->
  <circle cx="60" cy="100" r="2" fill="var(--accent, #8585e0)" stroke="none" opacity="0.6"/>
  <circle cx="74" cy="92" r="1.4" fill="var(--accent, #8585e0)" stroke="none" opacity="0.4"/>
  <circle cx="86" cy="110" r="1.2" fill="var(--accent, #8585e0)" stroke="none" opacity="0.5"/>
</svg>
